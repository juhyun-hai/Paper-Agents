# HotPaper log rotation — 사용자 권한으로 매일 cron이 invoke.
# state 파일은 user-writable 경로에 둠.
#
# crontab entry (이미 자동 추가됨):
#   5 0 * * * /usr/sbin/logrotate -s /home/juhyun/agent/paper-agent-github/backend/logs/.logrotate.state /home/juhyun/agent/paper-agent-github/backend/scripts/logrotate.conf

/home/juhyun/agent/paper-agent-github/backend/logs/*.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    dateext
    dateformat -%Y%m%d
    # 100MB 넘으면 즉시 회전 (daily 기다리지 않음)
    size 100M
}
